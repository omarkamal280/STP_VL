<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Single Page App for GitHub Pages</title>
  <script type="text/javascript">
    // Single Page Apps for GitHub Pages
    // MIT License
    // https://github.com/rafgraph/spa-github-pages
    // This script takes the current url and converts the path and query
    // string into just a query string, and then redirects the browser
    // to the new url with only a query string and hash fragment,
    // leaving the rest of the url to be handled by the app's router.
    // This script prevents the browser from trying to handle the 404
    // page as a normal page and instead lets the app handle it.
    (function(l) {
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) { 
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.location.replace(l.pathname.slice(0, -1) + decoded + l.hash);
      }
    }(window.location))
  </script>
</head>
<body>
</body>
</html>
